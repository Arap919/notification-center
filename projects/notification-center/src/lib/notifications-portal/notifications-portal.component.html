<div class='notifications-container'
     [@transformMenu]="_panelAnimationState"
     (@transformMenu.start)="onAnimationStart()"
     (@transformMenu.done)="onAnimationDone($event)">
  <ng-template [cdkPortalOutlet]="portal" *ngIf='titleComponent != null'></ng-template>
  <of-notifications-list [notifications]='(data | async) ?? []'></of-notifications-list>
</div>
